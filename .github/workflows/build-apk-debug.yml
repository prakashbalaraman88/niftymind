# =============================================================================
# NiftyMind - Debug APK Build Workflow
# =============================================================================
# Trigger: Manually via GitHub web UI (workflow_dispatch) or push to main
# Usage: Perfect for quick testing and development builds
# Works from phone: Go to Actions tab → "Build Debug APK" → "Run workflow"
# =============================================================================

name: Build Debug APK

on:
  # Manual trigger - works from GitHub mobile web app!
  workflow_dispatch:
    inputs:
      cache_enabled:
        description: 'Enable Gradle build cache'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  # Auto-trigger on pushes to main branch
  push:
    branches:
      - main
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/build-apk-debug.yml'

# Prevent concurrent builds from interfering with each other
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: artifacts/mobile

    env:
      CI: true
      NODE_ENV: development
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: ${{ github.workspace }}/artifacts/mobile/java

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js 18
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -----------------------------------------------------------------------
      # Step 3: Setup Java 17 (Temurin) - Required for Android Gradle build
      # -----------------------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Export JAVA_HOME for Gradle to use
      - name: Export JAVA_HOME
        run: echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Step 4: Setup Android SDK
      # -----------------------------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Accept Android SDK licenses automatically
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # -----------------------------------------------------------------------
      # -----------------------------------------------------------------------
      # Step 5: Setup pnpm
      # -----------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          pnpm install --no-frozen-lockfile
          echo "Dependencies installed successfully"

      # -----------------------------------------------------------------------
      # Step 7: Run Expo prebuild to generate native Android project
      # -----------------------------------------------------------------------
      - name: Install Expo dependencies
        run: |
          echo "Installing Expo dependencies..."
          npx expo install
          echo "Dependencies installed."

      - name: Expo prebuild (Android)
        run: |
          echo "Running expo prebuild for Android..."
          npx expo prebuild --platform android --clean --skip-dependency-update
          echo "Prebuild complete. Android project generated."

      # Verify the Android project was created
      - name: Verify Android project structure
        run: |
          echo "Checking Android project..."
          ls -la android/
          ls -la android/app/
          test -f android/gradlew && echo "Gradle wrapper found" || echo "WARNING: Gradle wrapper missing"

      # -----------------------------------------------------------------------
      # Step 8: Make Gradle wrapper executable
      # -----------------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # Step 9: Build Debug APK with Gradle
      # -----------------------------------------------------------------------
      - name: Build debug APK (assembleDebug)
        run: |
          echo "Starting debug APK build..."
          cd android
          if [ "${{ github.event.inputs.cache_enabled }}" = "false" ]; then
            ./gradlew clean
          fi
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --parallel \
            --configure-on-demand
          echo "Debug APK build complete!"
        timeout-minutes: 30

      # -----------------------------------------------------------------------
      # Step 10: Verify APK was produced
      # -----------------------------------------------------------------------
      - name: Verify APK output
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK found at: $APK_PATH"
            ls -lh "$APK_PATH"
            echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "ERROR: APK not found at expected path!"
            echo "Searching for APK files..."
            find android -name "*.apk" -type f
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 11: Upload APK as GitHub artifact (downloadable for 90 days)
      # -----------------------------------------------------------------------
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: niftymind-debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          if-no-files-found: error
          compression-level: 0  # APK is already compressed

      # -----------------------------------------------------------------------
      # Step 12: Create GitHub Release with APK attached (optional)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release (debug)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: debug-${{ github.run_number }}
          name: NiftyMind Debug Build #${{ github.run_number }}
          body: |
            Debug APK build triggered by ${{ github.actor }}

            - Build number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Trigger: ${{ github.event_name }}

            Install the APK on your Android device to test.
          files: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Step 13: Build summary
      # -----------------------------------------------------------------------
      - name: Build summary
        if: always()
        run: |
          echo "========================================"
          echo "  NiftyMind Debug Build Summary"
          echo "========================================"
          echo "Status: ${{ job.status }}"
          echo "APK: app-debug.apk"
          if [ -n "${{ env.APK_SIZE }}" ]; then
            echo "Size: $(numfmt --to=iec ${{ env.APK_SIZE }})"
          fi
          echo "Download: Go to Actions → this run → Artifacts"
          echo "========================================"
