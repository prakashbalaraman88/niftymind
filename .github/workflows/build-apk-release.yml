# NiftyMind - RELEASE APK Build
name: Build Release APK
on:
  workflow_dispatch:
jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: artifacts/mobile
    env:
      CI: true
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: pnpm install --no-frozen-lockfile
      - run: npx expo install
      - run: script -q /dev/null -c "npx expo prebuild --platform android"
      - run: chmod +x android/gradlew
      - run: |
          cd android
          ./gradlew assembleRelease --no-daemon --build-cache --parallel --configure-on-demand
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: niftymind-release-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
