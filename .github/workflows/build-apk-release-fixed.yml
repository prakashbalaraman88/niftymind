name: Build Release APK (Fixed)

on:
  workflow_dispatch:

env:
  NODE_VERSION: 22
  JAVA_VERSION: 17
  PNPM_VERSION: 9
  WORKING_DIRECTORY: artifacts/mobile

jobs:
  build-android-release:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      # Step 1: Checkout repository with full history
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Node.js 22 (REQUIRED - Node 18 fails with toReversed error)
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Setup pnpm 9 (REQUIRED - project uses catalog: protocol)
      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      # Step 4: Setup Java 17 (REQUIRED for Android Gradle Plugin 8.x)
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      # Step 5: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Step 6: Get pnpm store directory for caching
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      # Step 7: Cache pnpm dependencies
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Step 8: Install dependencies (REQUIRED --no-frozen-lockfile for catalog: protocol)
      - name: Install dependencies with pnpm
        run: pnpm install --no-frozen-lockfile

      # Step 9: Install babel-preset-expo + private methods plugin (REQUIRED - pnpm monorepo + Hermes limitation)
      - name: Install babel-preset-expo and private methods plugin for Metro bundler
        run: |
          pnpm add -D babel-preset-expo --ignore-workspace-root-check
          pnpm add -D @babel/plugin-transform-private-methods --ignore-workspace-root-check

      # Step 10: Patch babel.config.js to transpile private class fields for Hermes (REQUIRED - Hermes doesn't support private properties)
      - name: Patch Babel config for Hermes compatibility
        run: |
          cat > babel.config.js << 'EOF'
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: [["babel-preset-expo", { unstable_transformImportMeta: true }]],
              plugins: [
                ["@babel/plugin-transform-private-methods", { loose: true }]
              ],
            };
          };
          EOF

      # Step 11: Run Expo prebuild to generate android/ directory (REQUIRED - CNG project has no android/ dir)
      - name: Expo prebuild for Android
        run: npx expo prebuild --platform android --no-install

      # Step 12: Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Step 13: Build Release APK
      - name: Build Android Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      # Step 14: Verify APK output
      - name: Verify APK output
        run: |
          echo "=== Listing APK output ==="
          find android -name "*.apk" -type f 2>/dev/null || true
          echo "=== APK file details ==="
          ls -lh android/app/build/outputs/apk/release/*.apk 2>/dev/null || true

      # Step 15: Upload APK artifact with 90-day retention
      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: niftymind-release-apk
          path: ${{ env.WORKING_DIRECTORY }}/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
          if-no-files-found: warn